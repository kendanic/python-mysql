version: '3.8'

services:
  app:
    build: .
    container_name: python-app
    restart: always
    ports:
      - "5000:5000"
    network_mode: host  # <--- This gives access to localhost
    environment:
      - DB_HOST=127.0.0.1
      - DB_USER=ken
      - DB_PASSWORD=Ken@123
      - DB_NAME=kendanic

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./web/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

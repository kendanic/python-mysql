name: Dev Deploy from Feature

on:
  push:
    branches:
      - feature/*
      - release/*

jobs:
  build-deploy:
    runs-on: 
      - self-hosted 
      - officelap

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t pythonapp-dev:${{ github.sha }} .

      - name: Save Docker Image
        run: |
          docker save -o pythonapp-dev.tar pythonapp-dev:${{ github.sha }}

      - name: Copy Docker Image to Dev Server via SCP (with password)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWD }}
          port: ${{ secrets.DEV_SERVER_PORT }}
          source: "pythonapp-dev.tar"
          target: "/tmp/"

      - name: Run Docker on Dev Server via SSH (with password)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWD }}
          port: ${{ secrets.DEV_SERVER_PORT }}
          script: |
            docker stop pythonapp-dev || true
            docker rm pythonapp-dev || true
            docker load -i /tmp/pythonapp-dev.tar
            docker run -d --name pythonapp-dev --restart unless-stopped pythonapp-dev:${{ github.sha }}

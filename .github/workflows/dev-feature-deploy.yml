name: Build & Deploy to Dev from GitHub

on:
  push:
    branches:
      - feature/*
      - release/*


jobs:
  build-push-deploy:
    runs-on:       
      - self-hosted 
      - officelap
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short git commit SHA
        id: vars
        run: echo "COMMIT_SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_ENV

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            kendanic/python-app-dev-rest-api:${{ env.COMMIT_SHORT_SHA }}
            kendanic/python-app-dev-rest-api:latest
          build-args: |
            COMMIT_ID=${{ env.COMMIT_SHORT_SHA }}

      - name: Deploy to Dev Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWD }}
          port: 22
          script: |
            echo "Stopping and removing old container..."
            docker stop pythonapp || true
            docker rm pythonapp || true

            echo "Pulling new image from Docker Hub..."
            docker pull kendanic/python-app-dev-rest-api:latest

            echo "Running new container..."
            docker run -d --name pythonapp \
              --restart unless-stopped \
              kendanic/python-app-dev-rest-api:latest


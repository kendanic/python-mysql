name: Build & Deploy to Dev from GitHub

on:
  push:
    branches:
      - feature/*
      - release/*
  pull_request:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: [self-hosted, officelap] 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short git commit SHA
        id: vars
        run: echo "COMMIT_SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)" >> $GITHUB_ENV

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            kendanic/python-app-dev-rest-api:${{ env.COMMIT_SHORT_SHA }}
            kendanic/python-app-dev-rest-api:latest
          build-args: |
            COMMIT_ID=${{ env.COMMIT_SHORT_SHA }}

  deploy-latest-to-dev:
    runs-on: [self-hosted, officelap]
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Deploy to Dev Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWD }}
          port: ${{ secrets.DEV_SERVER_PORT }}
          script: |
            docker stop pythonapp || true
            docker rm pythonapp || true
            docker pull kendanic/python-app-dev-rest-api:latest
            docker run -d --name pythonapp --restart unless-stopped -p 5000:5000 kendanic/python-app-dev-rest-api:${{ env.COMMIT_SHORT_SHA }}


  pull-and-run-dev:
    name: PR Build Check for Develop
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Code Format
        run: |
          echo "Running validation for pull request to develop"
          python -m py_compile app/*.py || exit 1




